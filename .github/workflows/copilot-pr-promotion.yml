name: copilot-pr-promotion

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  promote:
    if: >-
      ${{ vars.COPILOT_PR_PROMOTION_ENABLED == 'true' &&
          startsWith(github.event.pull_request.head.ref, 'copilot/') &&
          github.event.pull_request.user.login == 'copilot-swe-agent[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Remove human reviewers and mark the PR ready
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          pr=$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER")
          human_reviewers=$(jq -c '[.requested_reviewers[] | select(.type == "User") | .login]' <<< "$pr")

          if [ "$(jq 'length' <<< "$human_reviewers")" -gt 0 ]; then
            jq -n --argjson reviewers "$human_reviewers" '{reviewers: $reviewers}' \
              | gh api --method DELETE \
                  "repos/$REPOSITORY/pulls/$PR_NUMBER/requested_reviewers" \
                  --input -
          else
            echo "No requested human reviewers to remove."
          fi

          if [ "$(jq -r '.draft' <<< "$pr")" = "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "$REPOSITORY"
          else
            echo "Pull request is already ready for review."
          fi
